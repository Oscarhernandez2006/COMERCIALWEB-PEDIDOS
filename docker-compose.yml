services:
  db:
    image: postgres:16-alpine
    container_name: comercial_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comercial
    ports:
      - '5432:5432'
    volumes:
      - comercial_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  comercial_pgdata:
